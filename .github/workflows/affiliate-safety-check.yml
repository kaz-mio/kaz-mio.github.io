name: Affiliate Safety Check

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "15 22 * * *"

jobs:
  safety-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run affiliate safety check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/affiliate_safety_check.py
