name: Update Land Price Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build municipal land price data
        run: python scripts/update_land_price_municipal_data.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- assets/land-prices/land_price_municipal_latest.json; then
            echo "No land price data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/land-prices/land_price_municipal_latest.json
          git commit -m "Update municipal land price data"
          git push
