<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>住宅シミュレーター埋め込み例</title>
  <style>
    body {
      margin: 0;
      background: #eef2ed;
      color: #1c2520;
      font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif;
    }
    .section {
      max-width: 1480px;
      margin: 0 auto;
      padding: 32px 18px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 3vw, 42px);
      letter-spacing: 0;
    }
    p {
      max-width: 760px;
      margin: 0 0 18px;
      color: #607067;
      line-height: 1.75;
    }
    iframe {
      width: 100%;
      height: min(860px, 92vh);
      border: 0;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(34, 48, 42, 0.18);
      background: #fff;
    }
  </style>
</head>
<body>
  <section class="section">
    <h1>敷地から考える住宅計画シミュレーター</h1>
    <p>土地の広さ、地域条件、雪置き場、建坪、間取り、外構、3Dパースをその場で確認できます。</p>
    <iframe src="index.html#embed" loading="lazy" title="住宅計画シミュレーター"></iframe>
  </section>
</body>
</html>
