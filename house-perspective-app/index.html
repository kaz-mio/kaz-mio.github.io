<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>House Perspective Studio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">HP</span>
        <div>
          <h1>House Perspective Studio</h1>
          <p id="projectSubtitle">実寸平面図と外構パース</p>
        </div>
      </div>
      <div class="version-switch" aria-label="バージョン切替">
        <button id="simpleVersionBtn" class="version-button">簡易</button>
        <button id="detailVersionBtn" class="version-button active">詳細</button>
      </div>
      <div class="top-actions">
        <button id="saveBtn" class="button">保存</button>
        <button id="loadBtn" class="button">復元</button>
        <button id="exportJsonBtn" class="button">JSON</button>
        <button id="importJsonBtn" class="button">読込</button>
        <button id="planPngBtn" class="button primary">平面PNG</button>
        <button id="perspectivePngBtn" class="button primary">パースPNG</button>
        <button id="hiResPngBtn" class="button primary">高精細PNG</button>
        <button id="embedModeBtn" class="button">公開表示</button>
        <button id="copyEmbedBtn" class="button">埋込</button>
        <input id="importFile" type="file" accept="application/json" hidden>
      </div>
    </header>

    <main class="workspace">
      <aside class="left-panel" aria-label="編集パネル">
        <section class="panel">
          <div class="panel-title">
            <h2>敷地</h2>
            <button id="sampleBtn" class="small-button">サンプル</button>
          </div>
          <div class="field-grid two">
            <label>
              <span>幅 m</span>
              <input id="landWidthInput" type="number" min="4" step="0.5">
            </label>
            <label>
              <span>奥行 m</span>
              <input id="landDepthInput" type="number" min="4" step="0.5">
            </label>
            <label>
              <span>方位</span>
              <select id="orientationInput">
                <option value="north">北上</option>
                <option value="east">東上</option>
                <option value="south">南上</option>
                <option value="west">西上</option>
              </select>
            </label>
            <label>
              <span>地域条件</span>
              <select id="regionInput">
                <option value="hokkaido">北海道</option>
                <option value="snowy">多雪地域</option>
                <option value="standard">標準地域</option>
                <option value="urban">都市部</option>
              </select>
            </label>
            <label>
              <span>グリッド m</span>
              <select id="gridInput">
                <option value="0.25">0.25</option>
                <option value="0.5">0.5</option>
                <option value="1">1.0</option>
              </select>
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>作図</h2>
            <div class="segmented">
              <button id="selectModeBtn" class="segment active">選択</button>
              <button id="addModeBtn" class="segment">配置</button>
            </div>
          </div>
          <div class="tool-row">
            <button id="addRoomBtn" class="button wide">部屋を追加</button>
          </div>
          <label class="stacked">
            <span>配置プリセット</span>
            <select id="presetSelect"></select>
          </label>
          <button id="addObjectBtn" class="button wide">選択中の位置へ配置</button>
          <div class="toggle-row">
            <label><input id="snapToggle" type="checkbox" checked> スナップ</label>
            <label><input id="dimToggle" type="checkbox" checked> 寸法</label>
            <label><input id="roofToggle" type="checkbox"> 屋根</label>
          </div>
        </section>

        <section class="panel inspector-panel">
          <div class="panel-title">
            <h2>プロパティ</h2>
            <span id="selectedBadge" class="badge">未選択</span>
          </div>
          <div id="inspector" class="inspector-empty"></div>
        </section>
      </aside>

      <section class="plan-area" aria-label="平面図">
        <div class="canvas-head">
          <div>
            <h2>2D 平面図</h2>
            <p id="cursorReadout">0.00 m, 0.00 m</p>
          </div>
          <div class="canvas-controls">
            <button id="zoomOutBtn" class="icon-button" title="縮小">-</button>
            <span id="zoomReadout" class="zoom-readout">100%</span>
            <button id="zoomInBtn" class="icon-button" title="拡大">+</button>
            <button id="fitBtn" class="icon-button" title="全体表示">Fit</button>
          </div>
        </div>
        <canvas id="planCanvas"></canvas>
      </section>

      <aside class="right-panel" aria-label="集計とパース">
        <section class="panel metrics-panel">
          <div class="panel-title">
            <h2>集計</h2>
            <span id="coverageBadge" class="badge"></span>
          </div>
          <div class="lot-summary">
            <div>
              <span>土地</span>
              <strong id="landTsuboSummary">0.00坪</strong>
            </div>
            <div>
              <span>建坪</span>
              <strong id="buildingTsuboSummary">0.00坪</strong>
            </div>
          </div>
          <div class="metric-grid">
            <div>
              <span>延床面積</span>
              <strong id="areaSqm">0.00</strong>
              <small>m²</small>
            </div>
            <div>
              <span>坪数</span>
              <strong id="areaTsubo">0.00</strong>
              <small>坪</small>
            </div>
            <div>
              <span>畳数</span>
              <strong id="areaTatami">0.0</strong>
              <small>帖</small>
            </div>
            <div>
              <span>敷地面積</span>
              <strong id="landArea">0.00</strong>
              <small>m²</small>
            </div>
            <div>
              <span>土地坪</span>
              <strong id="landTsubo">0.00</strong>
              <small>坪</small>
            </div>
            <div>
              <span>建坪</span>
              <strong id="buildingTsubo">0.00</strong>
              <small>坪</small>
            </div>
            <div>
              <span>建築面積</span>
              <strong id="buildingSqm">0.00</strong>
              <small>m²</small>
            </div>
            <div>
              <span>部屋数</span>
              <strong id="roomCount">0</strong>
              <small>室</small>
            </div>
          </div>
        </section>

        <section class="panel recommendation-panel">
          <div class="panel-title">
            <h2>敷地予測・推奨</h2>
            <span id="recommendationBadge" class="badge">自動</span>
          </div>
          <div class="recommendation-hero">
            <span>推奨建坪</span>
            <strong id="recommendedTsubo">0.00坪</strong>
            <small id="recommendedRange">敷地条件から算出</small>
          </div>
          <div id="recommendationCards" class="recommendation-cards"></div>
          <div id="recommendationFactors" class="factor-list"></div>
          <button id="applyRecommendationBtn" class="button wide primary">推奨間取りにする</button>
        </section>

        <section class="panel perspective-panel">
          <div class="panel-title">
            <h2>3D パース</h2>
            <span id="perspectiveBadge" class="badge">詳細</span>
          </div>
          <canvas id="perspectiveCanvas"></canvas>
        </section>

        <section class="panel advanced-panel detail-only">
          <div class="panel-title">
            <h2>3D 精度</h2>
            <span class="badge">詳細設定</span>
          </div>
          <div class="field-grid two">
            <label>
              <span>視点角度</span>
              <input id="cameraAngleInput" type="range" min="20" max="70" step="1">
            </label>
            <label>
              <span>奥行き圧縮</span>
              <input id="depthScaleInput" type="range" min="0.22" max="0.52" step="0.01">
            </label>
            <label>
              <span>高さ倍率</span>
              <input id="verticalScaleInput" type="range" min="0.45" max="1.05" step="0.01">
            </label>
            <label>
              <span>壁厚 m</span>
              <input id="wallThicknessInput" type="number" min="0.08" max="0.35" step="0.01">
            </label>
            <label>
              <span>屋根高さ m</span>
              <input id="roofPitchInput" type="number" min="0.2" max="2.4" step="0.05">
            </label>
            <label>
              <span>壁の透明度</span>
              <input id="wallOpacityInput" type="range" min="0.45" max="1" step="0.01">
            </label>
            <label>
              <span>質感</span>
              <select id="materialStyleInput">
                <option value="realistic">リアル</option>
                <option value="snow">北海道スノー</option>
                <option value="studio">模型スタジオ</option>
              </select>
            </label>
            <label>
              <span>描画品質</span>
              <select id="renderQualityInput">
                <option value="balanced">標準</option>
                <option value="high">高精細</option>
                <option value="ultra">極細密</option>
              </select>
            </label>
            <label>
              <span>太陽方位</span>
              <input id="sunAngleInput" type="range" min="0" max="360" step="1">
            </label>
          </div>
          <div class="toggle-row two">
            <label><input id="shadowToggle" type="checkbox" checked> 影</label>
            <label><input id="opening3dToggle" type="checkbox" checked> 開口表現</label>
            <label><input id="textureToggle" type="checkbox" checked> 素材粒度</label>
            <label><input id="landscapeToggle" type="checkbox" checked> 外構演出</label>
          </div>
        </section>

        <section class="panel publish-panel detail-only">
          <div class="panel-title">
            <h2>ホームページ実装</h2>
            <span class="badge">埋込用</span>
          </div>
          <textarea id="embedSnippet" readonly></textarea>
        </section>

        <section class="panel list-panel">
          <div class="panel-title">
            <h2>部屋と配置</h2>
            <button id="clearBtn" class="small-button danger">全削除</button>
          </div>
          <div id="roomList" class="room-list"></div>
        </section>
      </aside>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
